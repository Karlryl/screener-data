name: Daily Yahoo Pull

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# Tag 153: serialize pushes to main — daily + monthly-sec-xbrl both push via retry-rebase.
# On the 1st of the month both fire within ~90 min of each other; without this one silently fails.
# Tag 219a (audit F-218c-03): manual workflow_dispatch runs get a per-run group so
# operators can re-run while a scheduled pull is in flight (otherwise the manual
# dispatch sits queued for up to 180 min waiting for the cron run, and on the
# free-plan can be evicted entirely). Scheduled cron runs still serialize on
# 'main-push' so daily + monthly-sec-xbrl don't clobber each other; the
# retry-with-rebase push loop handles the race the dispatch path can introduce.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || 'main-push' }}
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    # Tag 219 (Run #108 timeout post-mortem): Tag 215f's PULL_CONCURRENCY 20→8
    # made Yahoo Pull take ~163min (was ~75-90min at conc=20 but with 7,210
    # rate-limit fails). That eats 163/180 of the job budget, leaving only
    # 17min for the 17 downstream steps (Pull Historical Prices alone needs
    # ~10-20min). Run #108 SIGKILL'd 1min into Pull Historical Prices —
    # snapshots from Yahoo Pull were never committed. Raised to 240min so
    # the downstream chain has ~75min of breathing room.
    timeout-minutes: 240
    env:
      # Tag 215f: lowered from 20 → 8. Run #107 produced 7,210 rate-limit
      # failures (82% of 8,769 total fails) because Yahoo's Cloudflare Edge
      # could not sustain 20 concurrent requests. With 8-way concurrency the
      # request rate stays well under Yahoo's throttle threshold. Empirical
      # from Tag 147 era: 8 was the original hardcoded default before being
      # raised to 20. The Tag 163 retry budget (5s/12s) is too short for
      # CDN-edge 429s — Tag 215f also extends to 15s/45s (see pull-yahoo.js).
      PULL_CONCURRENCY: '8'
    steps:
      # Tag 219 (audit F-219b-01 HIGH): freeze a shared run-date at job start
      # so all snapshot-* scripts agree on TODAY's date, even if the Yahoo
      # pull crosses UTC midnight (~3h pull starting 22:00 UTC, finishing
      # 01:00 UTC the next day would yield picks-history/2026-05-17.json
      # but methods-history/2026-05-18.json — silently breaking pick-diff's
      # findMethodFile lookup and method-effectiveness's vintage cache).
      # Downstream snapshot-* scripts respect RUN_DATE_UTC over Date.now().
      - name: Freeze Run Date
        run: |
          RUN_DATE_UTC=$(date -u +%Y-%m-%d)
          echo "RUN_DATE_UTC=$RUN_DATE_UTC" >> $GITHUB_ENV
          echo "Frozen run date: $RUN_DATE_UTC"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # F-CI-004: full history required for git-log operations and reliable rebase
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # F-CI-011: cache npm dependencies to save ~30-90s per run
          cache: 'npm'


      - name: Verify Node version
        run: node --version && npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Tag-23: Pre-Pull Engine-Tests. Bricht workflow ab BEVOR Yahoo-Pull
      # läuft, falls Engine/Orchestrator/Filters durch einen Commit kaputt sind.
      # Schützt gegen production-Schäden bei Engine-Bugs.
      - name: Run Engine Tests (pre-pull guard)
        run: node engine-cli-tests.js

      # Tag-28: Methods-Plugin-Tests
      - name: Run Method Tests
        run: |
          echo "--- tag21 ---" && node tag21-tests.js && echo "tag21 PASS" || { echo "tag21 FAIL"; exit 1; }
          echo "--- tag22 ---" && node tag22-tests.js && echo "tag22 PASS" || { echo "tag22 FAIL"; exit 1; }
          echo "--- tag28 ---" && node tag28-tests.js && echo "tag28 PASS" || { echo "tag28 FAIL"; exit 1; }

      # Tag 132: Auto-Universe-Refresh — laeuft bei jedem Run (schedule + workflow_dispatch).
      # Tag 133: Merged mit SEC EDGAR, Finnhub, Wikipedia Indices.
      # Tag 165: OTC Markets (OTCQX/OTCQB/Expert) + NASDAQ Screener API added.
      #          Target universe raised to 12,000+ tickers.
      # Tag 227a (silent-cap audit): MAX_UNIVERSE raised 13000 -> 25000. The cap
      # is applied to the *discovered* candidate set in refresh-universe.js (top
      # N by mcap, plus a 20% null-mcap slice). With today's watchlist already
      # at 15,734 — and the SEC/Finnhub/OTC sources contributing ~20-25k raw
      # candidates per run — the 13k cap was silently dropping every newly-IPO'd
      # ticker on the bottom rung (the existing 15.7k watchlist already exceeds
      # the cap, so new tickers were competing for slots the cap had pre-filled).
      # Precedent: memory `ci_coverage_gate_calibration.md` (audit Tag 215e
      # `max(absolute, percent)` dual gate). 25k gives 2-3 years of universe-
      # growth headroom; Node OOM is mitigated by the `--max-old-space-size=6144`
      # on pull-yahoo.js and refresh-universe.js's own 20% null-mcap proportional
      # split.
      # FINNHUB_API_KEY: GitHub Secret (Settings → Secrets → Actions → FINNHUB_API_KEY)
      - name: Refresh Universe
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          MAX_UNIVERSE: '25000'
        run: node refresh-universe.js --watchlist watchlist.json
        continue-on-error: true

      # Tag 142: Prune delisted/stale tickers before Yahoo pull
      - name: Prune Watchlist
        run: node scripts/prune-watchlist.js
        continue-on-error: true

      # F-CI-003 (Tag 179): Refresh Universe / Prune Watchlist run with continue-on-error.
      # Without a sanity check, a failure leaves a stale or degenerate watchlist that
      # silently propagates to the rest of the pipeline. Hard-fail if size dropped
      # below 200 (manual baseline floor) — that means refresh got nothing AND prune
      # ate too much, or watchlist.json got corrupted.
      - name: Verify Watchlist Sanity
        run: |
          if [ ! -f watchlist.json ]; then
            echo "::error::watchlist.json is missing after refresh+prune"
            exit 1
          fi
          # Tag 207a (CRITICAL CI FIX): the previous check used Object.keys(w).length
          # when w is not an array. The watchlist schema was wrapped into
          # { _meta, stocks: [...], lastUniverseRefresh, lastManualExpansion } — 4
          # top-level keys — so the check counted 4 < 200 → exit 1 → all 5 most
          # recent runs hard-failed despite 15,734 real stocks in w.stocks.
          # Schema-aware: prefer w.stocks (current), array (legacy), Object.keys (very old).
          size=$(node -e "const w=JSON.parse(require('fs').readFileSync('watchlist.json','utf8'));let n;if(Array.isArray(w))n=w.length;else if(w&&Array.isArray(w.stocks))n=w.stocks.length;else n=Object.keys(w).length;console.log(n)")
          echo "watchlist size: $size"
          if [ "$size" -lt 200 ]; then
            echo "::error::watchlist size $size < 200 — refresh/prune likely corrupted the universe"
            exit 1
          fi

      # Tag 133b: FX-Rates refresh — frische Yahoo-Currency-Quotes statt hardcoded.
      # Fix für stille mcap-Korruption bei non-USD-Tickern.
      - name: Refresh FX-Rates
        run: node scripts/refresh-fx.js
        continue-on-error: true

      # F-CI-004 (Tag 179): fx-rates.json staleness check. If refresh-fx silently failed
      # repeatedly, hardcoded fallbacks become source of truth which silently drifts
      # mcap normalization. Warn (not fail) if rates are older than 7 days; only fail
      # if rates older than 30 days (effectively unusable for cross-currency picks).
      - name: Verify FX-Rates Freshness
        run: |
          if [ -f fx-rates.json ]; then
            # Tag 219a (audit F-218c-06): on stat failure fall back to NOW (fail-open),
            # not 0 (epoch start / fail-closed). The outer [ -f ] already confirmed the
            # file exists; a stat failure here is almost certainly a transient permission
            # / race issue, and reporting the file as 600,000 days old would trip the
            # 30-day hard-fail downstream and kill the pipeline on a transient hiccup.
            now=$(date +%s)
            mtime=$(stat -c %Y fx-rates.json 2>/dev/null || echo "$now")
            age_days=$(( (now - mtime) / 86400 ))
            echo "fx-rates.json age: ${age_days} days"
            if [ "$age_days" -gt 30 ]; then
              echo "::error::fx-rates.json is ${age_days} days old — refresh-fx has been failing silently"
              exit 1
            fi
            if [ "$age_days" -gt 7 ]; then
              echo "::warning::fx-rates.json is ${age_days} days old — refresh-fx may be intermittently failing"
            fi
          else
            echo "::warning::fx-rates.json missing — pull-yahoo will use hardcoded fallback rates"
          fi

      - name: Run Yahoo Pull
        env:
          FUNDAMENTALS_MAX_AGE_DAYS: '7'
        run: node --max-old-space-size=6144 pull-yahoo.js --watchlist watchlist.json --output snapshots --rate-limit 2000
        continue-on-error: true
        timeout-minutes: 165

      # Tag 147: Quality-gate — fail hard only if coverage is too low to produce useful reports
      # Tag 161: relative threshold — max(1800, 40% of n_total)
      # Tag 162: file-count fallback — when Yahoo Pull times out the manifest is missing/zero
      # (manifest deleted at pull start, only written at pull end). Fall back to counting
      # actual .json snapshot files so partial-run progress is not thrown away.
      # F-CI-002: check manifest freshness — stale committed manifest from a prior run
      # would declare pass even when the current pull crashed early.
      - name: Check Manifest Freshness
        run: |
          if [ -f snapshots/_manifest.json ]; then
            # Tag 219a (audit F-218c-06): on stat failure fall back to NOW (fail-open),
            # not 0 (epoch start / fail-closed). The outer [ -f ] already confirmed the
            # file exists; if `stat` itself errors transiently, the previous `|| echo 0`
            # would silently `rm -f` a perfectly-fresh manifest and force the file-count
            # fallback. Keeping the manifest is the safer default — a genuinely stale
            # manifest gets caught on the next run.
            now=$(date +%s)
            manifest_mtime=$(stat -c %Y snapshots/_manifest.json 2>/dev/null || echo "$now")
            four_hours_ago=$(date -d '4 hours ago' +%s 2>/dev/null || echo "$((now - 14400))")
            if [ "$manifest_mtime" -lt "$four_hours_ago" ]; then
              echo "WARNING: snapshots/_manifest.json is older than 4 hours (mtime=$manifest_mtime, threshold=$four_hours_ago). Manifest may be stale from a prior run — file-count fallback will be used."
              rm -f snapshots/_manifest.json
            else
              echo "Manifest is fresh (mtime=$manifest_mtime)."
            fi
          else
            echo "No manifest found — file-count fallback will be used."
          fi

      # F-CI-016 (Tag 192): Snapshot-Freshness-Gate nach Pull, vor Downstream-Reports.
      # Problem: prior-failed-pull snapshots haben asOf von gestern; downstream
      # (snapshot-picks, detect-changes, walk-forward) verarbeitet sie als "heute"
      # → vintage duplication + 0% forward-return. Hier zählen wir wieviele
      # snapshots wirklich neuere asOf-Werte haben (< 36h alt). Wenn <50%
      # frisch sind, abort — der Pull war effektiv ein No-Op.
      - name: Verify Snapshot Freshness
        run: |
          node -e "
            const fs = require('fs');
            const dir = './snapshots';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('_'));
            const now = Date.now();
            const FRESH_MS = 36 * 3600 * 1000;
            let fresh = 0, stale = 0, unparseable = 0;
            for (const f of files) {
              try {
                const buf = require('fs').readFileSync(dir + '/' + f, 'utf8').slice(0, 800);
                // Tag 218: match BOTH asOf and fetchedAt. Pre-Tag-215j snapshots
                // only had fetchedAt; matching only asOf counted them all as
                // unparseable — Tag 215j fixed the pull side but old snapshots
                // in the repo still need backwards-compat.
                const m = buf.match(/\"(?:asOf|fetchedAt)\"\s*:\s*\"([^\"]+)\"/);
                if (!m) { unparseable++; continue; }
                const ts = new Date(m[1]).getTime();
                if (now - ts < FRESH_MS) fresh++; else stale++;
              } catch (e) { unparseable++; }
            }
            const pct = files.length > 0 ? (fresh / files.length * 100).toFixed(1) : '0';
            console.log('Snapshot freshness: ' + fresh + ' fresh / ' + stale + ' stale / ' + unparseable + ' unparseable of ' + files.length + ' (' + pct + '% fresh)');
            if (files.length > 0 && fresh / files.length < 0.5) {
              console.error('::error::F-CI-016 — fewer than 50% of snapshots are fresh (<36h asOf). Pull likely failed; refusing to publish stale data.');
              process.exit(1);
            }
          "
        # Tag 218 (audit F-218c-01 HIGH): flip from continue-on-error:true to
        # fail-on-error. Tag 192's 'WARN initially; flip later' has been dormant
        # for months — stale pulls flowed downstream into snapshot-picks,
        # detect-changes, walk-forward. Now combined with Tag 218 regex fix
        # (match asOf OR fetchedAt) the gate can finally do its job.
        continue-on-error: false

      - name: Verify Pull Coverage
        run: |
          # Tag 220c (audit F-219b-02 MEDIUM): honor the manifest's `partial` flag.
          # pull-yahoo writes partial:true on every incremental flush (~100 tickers)
          # and partial:false only on the clean final write. A SIGKILL after the
          # last incremental flush but before the final write leaves partial:true
          # on disk with whatever n_ok happened to be there — if that count
          # exceeds max(2500, 18%) the coverage gate silently passes despite the
          # run being killed mid-flight. Fail the gate before reading n_ok.
          partial=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./snapshots/_manifest.json','utf8'));console.log(m.partial===true?'true':'false')}catch(e){console.log('false')}")
          if [ "$partial" = "true" ]; then
            echo "::error::Manifest reports partial=true — pull was killed mid-flight (incremental flush, final write never ran). Coverage gate refusing to pass regardless of n_ok."
            exit 1
          fi
          ok=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./snapshots/_manifest.json','utf8'));console.log(m.n_ok||0)}catch(e){console.log(0)}")
          total=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./snapshots/_manifest.json','utf8'));console.log(m.n_total||0)}catch(e){console.log(0)}")
          source="manifest"
          # F-CI-012: use watchlist length as the denominator in fallback (not file_count)
          # to avoid 100% coverage when total=file_count and ok=file_count (1800/1800 = 100%)
          # Tag 207b: schema-aware watchlist size (same fix pattern as Tag 207a).
          # Watchlist is { _meta, stocks:[...], lastUniverseRefresh, ... } since wrap;
          # counting Object.keys returned 4 instead of 15734 (only mattered in the
          # fallback branch but still latent bug).
          watchlist_total=$(node -e "const fs=require('fs');try{const w=JSON.parse(fs.readFileSync('./watchlist.json','utf8'));let n;if(Array.isArray(w))n=w.length;else if(w&&Array.isArray(w.stocks))n=w.stocks.length;else n=Object.keys(w).length;console.log(n)}catch(e){console.log(0)}")
          if [ "$total" -eq 0 ] || [ "$ok" -eq 0 ]; then
            file_count=$(node -e "const fs=require('fs');try{const files=fs.readdirSync('./snapshots').filter(f=>f.endsWith('.json')&&f!=='_manifest.json');console.log(files.length)}catch(e){console.log(0)}")
            echo "Manifest reports $ok/$total — falling back to file count: $file_count .json files in ./snapshots/"
            ok=$file_count
            # F-CI-012: use watchlist total as denominator so 1800/13000 correctly fails the 40% gate
            if [ "$watchlist_total" -gt 0 ]; then
              total=$watchlist_total
              source="file-count/watchlist-denom"
            else
              total=$file_count
              source="file-count"
            fi
          fi
          # Tag 207b: relaxed coverage gate after run #104 failed at this step with a
          # 7-hour Yahoo Pull (compared to historical 75-165min). Yahoo's reliability
          # fluctuates; the prior 40%/1800-floor was too strict — one bad-Yahoo day
          # killed the entire pipeline. New: 25% relative / 1000 absolute floor.
          # Still rejects "Yahoo totally broken" (~0 pulls) but tolerates 20-40%
          # throttle days that historically passed.
          #
          # Tag 215e: universe grew from ~13k (Tag 207b era) to ~19k (Tag 215 era)
          # because refresh-universe expanded discovery (Tag 165 NASDAQ Screener API
          # + Tag 165 OTC Markets). Same percentage-of-universe gate is now
          # effectively tighter — Run #105/#106/#107 all delivered 3500-3700
          # snapshots which is healthy by absolute count but only 18-19% of the
          # bigger universe. Calibrating to ABSOLUTE 2500 + RELATIVE 18% so a
          # 3500-snapshot pull (the historical-normal absolute count) passes
          # regardless of universe expansion. Yahoo-totally-broken (<1000 ok)
          # still hard-fails.
          min_ok=$(node -e "console.log(Math.max(2500,Math.floor(${total}*0.18)))")
          echo "Snapshots ok: $ok / $total (threshold: $min_ok = max(2500, total*0.18), source: $source)"
          if [ "$ok" -lt "$min_ok" ]; then
            echo "::error::Pull coverage $ok/$total < threshold $min_ok (18% of universe, floor 2500, source: $source)"
            exit 1
          fi

      - name: Detect Changes + Discord-Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node detect-changes.js --snapshots snapshots --state alert-state.json
        continue-on-error: true

      # Tag-49: Compute sector-medians-auto from current snapshots
      - name: Compute Sector-Medians (auto)
        run: node methods/sector-medians-compute.js ./snapshots
        continue-on-error: true

      # Tag-28: Methods-Report (Werte-Matrix pro Stock × Methode)
      # Tag 102b: Methods-Report deaktiviert — Modes-Report ist primärer Output
      
      # Tag 100: Modes-Report (3 Discovery-Modi: Hypergrowth/Quality/Turnaround)
      # Tag 134: hard-fail. modes-report is the primary user-facing artifact;
      # silently publishing yesterday's HTML masks real breakage.
      # Tag 168: continue-on-error — per-stock failures are soft-fail; Pipeline Health Check
      # below enforces the 5% threshold and hard-fails if breached.
      - name: Generate Modes-Report
        run: node generate-modes-report.js --snapshots snapshots --out modes-report.html
        continue-on-error: true

      # Tag 198: Bloomberg 6-tab Screener dashboard (HG/QC/SMALL/R40/PRE-BREAKOUT/WATCH).
      # New artifact alongside dashboard.html / modes-report.html / methods-report.html.
      # Tag 199: AUDIT_SCORE_MULTIPLIERS=1 enables q-spike-penalty + listing-age
      # multiplier in score-aggregator. Scoped to this step only — other artifacts
      # (snapshot-picks, modes-report) keep the un-multiplied scores so the
      # fixture-hash test in tag28-tests.js (run without env) stays stable.
      # continue-on-error: it's a secondary artifact; pipeline shouldn't hard-fail on it.
      - name: Generate Screener Dashboard
        env:
          AUDIT_SCORE_MULTIPLIERS: '1'
        run: node generate-screener.js --snapshots snapshots --out screener.html
        continue-on-error: true

      # Tag 203: Per-Ticker Score-History (sliding 30-entry window) — feeds the
      # screener detail modal's ΔScore badges + sparkline (Section D). Must
      # share AUDIT_SCORE_MULTIPLIERS with the dashboard step above so stored
      # scores match what the dashboard renders (design §4: drift here produces
      # a permanent fake "score uplift today" artifact). continue-on-error:
      # secondary artifact; pipeline-health-check enforces the 5% threshold.
      - name: Snapshot Score-History
        env:
          AUDIT_SCORE_MULTIPLIERS: '1'
        run: node scripts/snapshot-score-history.js --snapshots snapshots --out score-history
        continue-on-error: true

      # Tag 102g: Walk-Forward Picks-History — friert Mode-Picks pro Run für späteren Performance-Vergleich.
      # Tag 168: continue-on-error — per-stock failures are soft-fail; Pipeline Health Check
      # below enforces the 5% threshold AND F-CI-002 missing-report=100%-fail rule, so a
      # hard crash here is still caught downstream. (Tag 134's original hard-fail semantics
      # are preserved indirectly — see audit F-218c-08.)
      # Tag 219a (audit F-218c-04): INTENTIONALLY does NOT set AUDIT_SCORE_MULTIPLIERS.
      # picks-history must record un-multiplied scores so the tag28-tests fixture hash
      # stays stable across multiplier tuning (see Tag 199 / Tag 203 design notes). The
      # screener.html / score-history steps above DO set the env var because their job
      # is to surface the user-visible multiplied scores. Drift here would produce a
      # permanent fake "score uplift today" artifact — do not add the env var.
      - name: Snapshot Picks-History
        run: node snapshot-picks.js --snapshots snapshots --out picks-history
        continue-on-error: true

      # Tag 133d: Picks-Regression Guard — Alarm wenn Pick-Count >35% von 4-Week-Median driftet.
      # ALLOW_PICKS_DRIFT=1 für legitimate Universe-Expansion-Runs setzen.
      - name: Picks-Regression Check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ALLOW_PICKS_DRIFT: ${{ vars.ALLOW_PICKS_DRIFT || '0' }}
        run: |
          # F-CI-007: consistent DISCORD_WEBHOOK existence check before invoking script
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "DISCORD_WEBHOOK not configured — Discord alerts disabled."; fi
          node scripts/picks-regression-check.js
        continue-on-error: true

      # Tag-35: Methods-History-Snapshot (für Backtest später)
      # Tag 168: continue-on-error — per-stock failures are soft-fail; Pipeline Health Check
      # enforces the 5% threshold and the F-CI-002 missing-report rule. Tag 134's
      # hard-fail semantics are preserved indirectly.
      # Tag 219a (audit F-218c-04): INTENTIONALLY does NOT set AUDIT_SCORE_MULTIPLIERS.
      # Same rationale as Snapshot Picks-History above — fixture-hash stability and
      # un-multiplied scores are required for methods-history to be a meaningful
      # backtest input.
      - name: Snapshot Methods-History
        run: node snapshot-methods-history.js --out methods-history
        continue-on-error: true

      # Tag-63: Earnings-Calendar Pull
      # F-CI-005: Pipeline Health Check moved to AFTER commit so snapshots are always
      # committed even if health check fails (prevents vintage continuity gaps).
      - name: Pull Earnings-Calendar
        env:
          EARNINGS_CONCURRENCY: '20'
        run: node pull-earnings-dates.js
        continue-on-error: true

      # Tag-39: Historical-Price-Pull (für Performance-Backtest)
      - name: Pull Historical Prices
        env:
          PRICE_CONCURRENCY: '20'
        run: node pull-historical-prices.js --out prices --rate-limit 1500
        continue-on-error: true

      # Tag 139: Macro-Regime-Tagging — SPY 200d-MA → BULL/BEAR/SIDEWAYS
      - name: Compute Macro Regime
        run: node scripts/macro-regime.js
        continue-on-error: true

      # Tag 133e: Walk-Forward-Performance — picks-history × prices/history.json.
      # Berechnet 1w/4w/12w α der Modi vs Universe-Median. Survivor-biased Caveat dokumentiert.
      - name: Walk-Forward Performance
        run: node scripts/walk-forward-perf.js
        continue-on-error: true

      # Tag 133f: Method-Effectiveness Audit — welche Methoden korrelieren mit Forward-Return?
      - name: Method-Effectiveness Audit
        run: node scripts/method-effectiveness.js
        continue-on-error: true

      # Tag 134 — Phase 3.6: Methodology Report combines walk-forward + method-effectiveness
      # into a decision-ready summary. Read this in GitHub after the run completes.
      - name: Methodology Report
        run: node scripts/methodology-report.js
        continue-on-error: true

      # Tag 134 — Phase 4.2/4.4: pick-diff + Jaccard stability.
      # Writes outputs/pick-diff.{json,html} answering "what's new, what's gone, why".
      - name: Pick Diff + Jaccard
        run: node scripts/pick-diff.js
        continue-on-error: true

      # Tag 134 — Phase 4.3: Elliott-Wave Export CSV per mode.
      # Karl's downstream input — directly importable into Excel/Elliott tool.
      - name: Elliott CSV Export
        run: node scripts/elliott-export.js
        continue-on-error: true

      # Tag 133g: Pull-Stats Monitoring — Discord-Alert wenn ein Pull-Output >25% vs 4-Week-Median shrinkt.
      - name: Pull-Stats Check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ALLOW_PULL_DRIFT: ${{ vars.ALLOW_PULL_DRIFT || '0' }}
        run: |
          # F-CI-007: consistent DISCORD_WEBHOOK existence check before invoking script
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "DISCORD_WEBHOOK not configured — Discord alerts disabled."; fi
          node scripts/check-pull-stats.js
        continue-on-error: true

      # Tag 133j: Method-Drift Time-Series — Sparkline-Daten für Dashboard.
      - name: Compute Method-Drift
        run: node scripts/compute-method-drift.js
        continue-on-error: true

      # Tag-50: Watchlist-Diff-Report (zeigt Änderungen vs vorigem Run)
      - name: Generate Diff-Report
        run: node generate-diff-report.js --out diff-report.html
        continue-on-error: true

      # Tag-77: Dashboard mit Discover-Button
      - name: Generate Dashboard
        run: node generate-dashboard.js dashboard.html
        continue-on-error: true

      # Tag 134 — Phase 5.1: archive methods-history / picks-history / prices snapshots
      # older than 60 days into external-data/*.ndjson (git-ignored).
      # Reduces committed repo bloat. Rebuildable from snapshots on the runner.
      # Tag 153: methods-history is 14 MB/file (keep 7d = 98 MB max committed).
      # picks-history is 65 KB/file but walk-forward-perf needs 84+ day vintages (keep 90d).
      - name: Archive Old Snapshots
        run: node scripts/archive-old-snapshots.js --keep-days 14 --methods-keep-days 7 --picks-keep-days 90
        continue-on-error: true

      # F-SM-003 / F-CI-008: Strip methodHistory from alert-state.json using a script
      # instead of shell-interpolated inline node -e (avoids $size injection and non-atomic write).
      # saveState() in detect-changes.js now always writes methodHistory to the committed sidecar
      # (method-history-state.json) and never embeds it in alert-state.json. This step is a
      # safety net that cleans up any leftover inline methodHistory from old runs.
      - name: Strip methodHistory from alert-state
        run: |
          if [ -f alert-state.json ]; then
            size_before=$(stat -c %s alert-state.json)
            # F-CI-005 v2 (Tag 179): previously a JSON.parse failure silently reset
            # alert-state.json to {} — wiping all dedup state and flooding Discord on
            # the next detect-changes run. New behavior: on parse failure, back up
            # the corrupt file and exit non-zero so the workflow visibly fails. We
            # never want to silently overwrite production state.
            node -e "
              const fs = require('fs');
              let s;
              try { s = JSON.parse(fs.readFileSync('alert-state.json', 'utf8')); }
              catch (e) {
                const backup = 'alert-state.corrupt.' + Date.now() + '.json';
                try { fs.copyFileSync('alert-state.json', backup); } catch (_) {}
                console.error('::error::alert-state.json is corrupt:', e.message, '(backup: ' + backup + ')');
                process.exit(1);
              }
              delete s.methodHistory;
              const tmp = 'alert-state.json.tmp.' + process.pid;
              fs.writeFileSync(tmp, JSON.stringify(s));
              fs.renameSync(tmp, 'alert-state.json');
            "
            size_after=$(stat -c %s alert-state.json)
            echo "alert-state.json stripped: ${size_after} bytes (was ${size_before} bytes)"
          fi

      - name: Commit Snapshots + Alert-State
        run: |
          git config user.name "yahoo-pull-bot"
          git config user.email "yahoo-pull-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: yahoo-pull + alert-state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # F-CI-001 v2 (Tag 179): the previous fallback `git rebase --abort; git reset
            # --hard origin/main` was CRITICAL data-loss — it discarded the just-made
            # commit, after which `git push` succeeded as a no-op and the workflow
            # reported green while a full day of snapshots vanished. New strategy:
            # capture the just-made commit SHA, attempt rebase, and on rebase failure
            # abort cleanly without resetting. If push still fails after 3 retries the
            # workflow exits non-zero so the failure is visible (Discord alert via
            # the notify step).
            COMMIT_SHA=$(git rev-parse HEAD)
            echo "Local commit to publish: $COMMIT_SHA"
            for i in 1 2 3; do
              git fetch origin main
              if ! git rebase --autostash --strategy-option theirs origin/main; then
                echo "::warning::Rebase failed on attempt $i — aborting cleanly (preserves local commit)"
                git rebase --abort || true
                # Verify our commit is still here. If the rebase somehow lost it,
                # cherry-pick it back from the SHA captured before the rebase.
                if ! git rev-list HEAD | grep -q "^${COMMIT_SHA}$"; then
                  echo "::warning::Local commit lost during rebase — restoring from $COMMIT_SHA"
                  git reset --hard origin/main
                  git cherry-pick "$COMMIT_SHA" || { echo "::error::cherry-pick failed"; exit 1; }
                fi
              fi
              if git push; then
                echo "✓ Pushed on attempt $i (commit $(git rev-parse HEAD))"
                exit 0
              fi
              echo "Push attempt $i failed, retrying..."
              sleep $((5 * i))
            done
            echo "::error::Push failed after 3 attempts — local commit $COMMIT_SHA NOT on remote"
            exit 1
          fi

      # Tag 168: Pipeline Health Check — aggregates per-script failure rates and
      # alerts via Discord if any script exceeded the 5% threshold.
      # F-CI-005: placed AFTER commit so snapshots always land in git even if health
      # check fails. Health check failure blocks deploy but not the data commit.
      # The concurrency group (main-push) already prevents concurrent workflow pushes;
      # this comment documents why --strategy-option theirs is safe here.
      - name: Pipeline Health Check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not configured — health check will run without Discord alerts."
          fi
          node scripts/pipeline-health-check.js

      # Tag 146: Deploy HTML reports to GitHub Pages (gh-pages branch).
      # Separates generated web artifacts from the data/code on main.
      # Deploys: index.html, modes-report.html, diff-report.html, outputs/*.html|csv|md
      # Enable in repo Settings → Pages → Source: Deploy from branch → gh-pages / root.
      # Tag 153: only deploy when data commit succeeded — otherwise gh-pages would show
      # picks from today's run that never landed in main (mismatched report vs data).
      - name: Deploy to GitHub Pages
        if: success()
        run: |
          # Build a clean deploy directory
          mkdir -p _site/outputs
          cp index.html _site/ 2>/dev/null || true
          cp modes-report.html _site/ 2>/dev/null || true
          cp diff-report.html _site/ 2>/dev/null || true
          cp dashboard.html _site/ 2>/dev/null || true
          cp screener.html _site/ 2>/dev/null || true
          cp methods-report.html _site/ 2>/dev/null || true
          cp -r outputs/. _site/outputs/ 2>/dev/null || true

          # Push to gh-pages branch (orphan-safe force push)
          cd _site
          git init -b gh-pages
          git config user.name "yahoo-pull-bot"
          git config user.email "yahoo-pull-bot@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          git commit -m "deploy: screener reports $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # F-CI-006: retry loop for transient push failures on gh-pages
          for i in 1 2 3; do
            if git push --force origin gh-pages; then
              echo "✓ GitHub Pages deployed on attempt $i"
              exit 0
            fi
            echo "gh-pages push attempt $i failed, retrying..."
            sleep $((5 * i))
          done
          echo "gh-pages push failed after 3 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set, skipping notification."
            exit 0
          fi
          curl -H "Content-Type: application/json" -X POST \
            -d "{\"content\": \"⚠ Yahoo-Pull failed at $(date -u). See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK"
