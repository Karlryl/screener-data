name: Daily Yahoo Pull

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# Tag 153: serialize pushes to main — daily + monthly-sec-xbrl both push via retry-rebase.
# On the 1st of the month both fire within ~90 min of each other; without this one silently fails.
concurrency:
  group: main-push
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PULL_CONCURRENCY: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'


      - name: Verify Node version
        run: node --version && npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Tag-23: Pre-Pull Engine-Tests. Bricht workflow ab BEVOR Yahoo-Pull
      # läuft, falls Engine/Orchestrator/Filters durch einen Commit kaputt sind.
      # Schützt gegen production-Schäden bei Engine-Bugs.
      - name: Run Engine Tests (pre-pull guard)
        run: node engine-cli-tests.js

      # Tag-28: Methods-Plugin-Tests
      - name: Run Method Tests
        run: |
          echo "--- tag21 ---" && node tag21-tests.js && echo "tag21 PASS" || { echo "tag21 FAIL"; exit 1; }
          echo "--- tag22 ---" && node tag22-tests.js && echo "tag22 PASS" || { echo "tag22 FAIL"; exit 1; }
          echo "--- tag28 ---" && node tag28-tests.js && echo "tag28 PASS" || { echo "tag28 FAIL"; exit 1; }

      # Tag 132: Auto-Universe-Refresh — laeuft bei jedem Run (schedule + workflow_dispatch).
      # Tag 133: Merged mit SEC EDGAR, Finnhub, Wikipedia Indices.
      # Tag 165: OTC Markets (OTCQX/OTCQB/Expert) + NASDAQ Screener API added.
      #          Target universe raised to 12,000+ tickers. MAX_UNIVERSE=13000 (env default).
      # FINNHUB_API_KEY: GitHub Secret (Settings → Secrets → Actions → FINNHUB_API_KEY)
      - name: Refresh Universe
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          MAX_UNIVERSE: '13000'
        run: node refresh-universe.js --watchlist watchlist.json
        continue-on-error: true

      # Tag 142: Prune delisted/stale tickers before Yahoo pull
      - name: Prune Watchlist
        run: node scripts/prune-watchlist.js
        continue-on-error: true

      # Tag 133b: FX-Rates refresh — frische Yahoo-Currency-Quotes statt hardcoded.
      # Fix für stille mcap-Korruption bei non-USD-Tickern.
      - name: Refresh FX-Rates
        run: node scripts/refresh-fx.js
        continue-on-error: true

      - name: Run Yahoo Pull
        env:
          FUNDAMENTALS_MAX_AGE_DAYS: '7'
        run: node --max-old-space-size=6144 pull-yahoo.js --watchlist watchlist.json --output snapshots --rate-limit 2000
        continue-on-error: true
        timeout-minutes: 165

      # Tag 147: Quality-gate — fail hard only if coverage is too low to produce useful reports
      # Tag 161: relative threshold — max(1800, 40% of n_total)
      # Tag 162: file-count fallback — when Yahoo Pull times out the manifest is missing/zero
      # (manifest deleted at pull start, only written at pull end). Fall back to counting
      # actual .json snapshot files so partial-run progress is not thrown away.
      - name: Verify Pull Coverage
        run: |
          ok=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./snapshots/_manifest.json','utf8'));console.log(m.n_ok||0)}catch(e){console.log(0)}")
          total=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./snapshots/_manifest.json','utf8'));console.log(m.n_total||0)}catch(e){console.log(0)}")
          source="manifest"
          if [ "$total" -eq 0 ] || [ "$ok" -eq 0 ]; then
            file_count=$(node -e "const fs=require('fs');try{const files=fs.readdirSync('./snapshots').filter(f=>f.endsWith('.json')&&f!=='_manifest.json');console.log(files.length)}catch(e){console.log(0)}")
            echo "Manifest reports $ok/$total — falling back to file count: $file_count .json files in ./snapshots/"
            ok=$file_count
            total=$file_count
            source="file-count"
          fi
          min_ok=$(node -e "console.log(Math.max(1800,Math.floor(${total}*0.4)))")
          echo "Snapshots ok: $ok / $total (threshold: $min_ok, source: $source)"
          if [ "$ok" -lt "$min_ok" ]; then
            echo "::error::Pull coverage $ok/$total < threshold $min_ok (40% of universe, floor 1800, source: $source)"
            exit 1
          fi

      - name: Detect Changes + Discord-Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node detect-changes.js --snapshots snapshots --state alert-state.json
        continue-on-error: true

      # Tag-49: Compute sector-medians-auto from current snapshots
      - name: Compute Sector-Medians (auto)
        run: node methods/sector-medians-compute.js ./snapshots
        continue-on-error: true

      # Tag-28: Methods-Report (Werte-Matrix pro Stock × Methode)
      # Tag 102b: Methods-Report deaktiviert — Modes-Report ist primärer Output
      
      # Tag 100: Modes-Report (3 Discovery-Modi: Hypergrowth/Quality/Turnaround)
      # Tag 134: hard-fail. modes-report is the primary user-facing artifact;
      # silently publishing yesterday's HTML masks real breakage.
      # Tag 168: continue-on-error — per-stock failures are soft-fail; Pipeline Health Check
      # below enforces the 5% threshold and hard-fails if breached.
      - name: Generate Modes-Report
        run: node generate-modes-report.js --snapshots snapshots --out modes-report.html
        continue-on-error: true

      # Tag 102g: Walk-Forward Picks-History — friert Mode-Picks pro Run für späteren Performance-Vergleich.
      # Tag 134: hard-fail. picks-history is the source of truth for backtest;
      # a silent gap of even one week destroys vintage continuity.
      # Tag 168: continue-on-error — per-stock failures are soft-fail; Pipeline Health Check
      # below enforces the 5% threshold and hard-fails if breached.
      - name: Snapshot Picks-History
        run: node snapshot-picks.js --snapshots snapshots --out picks-history
        continue-on-error: true

      # Tag 133d: Picks-Regression Guard — Alarm wenn Pick-Count >35% von 4-Week-Median driftet.
      # ALLOW_PICKS_DRIFT=1 für legitimate Universe-Expansion-Runs setzen.
      - name: Picks-Regression Check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ALLOW_PICKS_DRIFT: ${{ vars.ALLOW_PICKS_DRIFT || '0' }}
        run: node scripts/picks-regression-check.js
        continue-on-error: true

      # Tag-35: Methods-History-Snapshot (für Backtest später)
      # Tag 134: hard-fail. methods-history feeds method-effectiveness which is
      # the core "is this method earning its weight?" measurement.
      # Tag 168: continue-on-error — per-stock failures are soft-fail; Pipeline Health Check
      # below enforces the 5% threshold and hard-fails if breached.
      - name: Snapshot Methods-History
        run: node snapshot-methods-history.js --out methods-history
        continue-on-error: true

      # Tag 168: Pipeline Health Check — aggregates per-script failure rates and
      # alerts via Discord if any script exceeded the 5% threshold. The scripts
      # themselves don't hard-fail anymore (Tag 168 — continue-on-error: true),
      # but the health check IS hard-fail so an actual systemic problem still
      # blocks downstream artifacts.
      - name: Pipeline Health Check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/pipeline-health-check.js

      # Tag-63: Earnings-Calendar Pull
      - name: Pull Earnings-Calendar
        env:
          EARNINGS_CONCURRENCY: '20'
        run: node pull-earnings-dates.js
        continue-on-error: true

      # Tag-39: Historical-Price-Pull (für Performance-Backtest)
      - name: Pull Historical Prices
        env:
          PRICE_CONCURRENCY: '20'
        run: node pull-historical-prices.js --out prices --rate-limit 1500
        continue-on-error: true

      # Tag 139: Macro-Regime-Tagging — SPY 200d-MA → BULL/BEAR/SIDEWAYS
      - name: Compute Macro Regime
        run: node scripts/macro-regime.js
        continue-on-error: true

      # Tag 133e: Walk-Forward-Performance — picks-history × prices/history.json.
      # Berechnet 1w/4w/12w α der Modi vs Universe-Median. Survivor-biased Caveat dokumentiert.
      - name: Walk-Forward Performance
        run: node scripts/walk-forward-perf.js
        continue-on-error: true

      # Tag 133f: Method-Effectiveness Audit — welche Methoden korrelieren mit Forward-Return?
      - name: Method-Effectiveness Audit
        run: node scripts/method-effectiveness.js
        continue-on-error: true

      # Tag 134 — Phase 3.6: Methodology Report combines walk-forward + method-effectiveness
      # into a decision-ready summary. Read this in GitHub after the run completes.
      - name: Methodology Report
        run: node scripts/methodology-report.js
        continue-on-error: true

      # Tag 134 — Phase 4.2/4.4: pick-diff + Jaccard stability.
      # Writes outputs/pick-diff.{json,html} answering "what's new, what's gone, why".
      - name: Pick Diff + Jaccard
        run: node scripts/pick-diff.js
        continue-on-error: true

      # Tag 134 — Phase 4.3: Elliott-Wave Export CSV per mode.
      # Karl's downstream input — directly importable into Excel/Elliott tool.
      - name: Elliott CSV Export
        run: node scripts/elliott-export.js
        continue-on-error: true

      # Tag 133g: Pull-Stats Monitoring — Discord-Alert wenn ein Pull-Output >25% vs 4-Week-Median shrinkt.
      - name: Pull-Stats Check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ALLOW_PULL_DRIFT: ${{ vars.ALLOW_PULL_DRIFT || '0' }}
        run: node scripts/check-pull-stats.js
        continue-on-error: true

      # Tag 133j: Method-Drift Time-Series — Sparkline-Daten für Dashboard.
      - name: Compute Method-Drift
        run: node scripts/compute-method-drift.js
        continue-on-error: true

      # Tag-50: Watchlist-Diff-Report (zeigt Änderungen vs vorigem Run)
      - name: Generate Diff-Report
        run: node generate-diff-report.js --out diff-report.html
        continue-on-error: true

      # Tag-77: Dashboard mit Discover-Button
      - name: Generate Dashboard
        run: node generate-dashboard.js dashboard.html
        continue-on-error: true

      # Tag 134 — Phase 5.1: archive methods-history / picks-history / prices snapshots
      # older than 60 days into external-data/*.ndjson (git-ignored).
      # Reduces committed repo bloat. Rebuildable from snapshots on the runner.
      # Tag 153: methods-history is 14 MB/file (keep 7d = 98 MB max committed).
      # picks-history is 65 KB/file but walk-forward-perf needs 84+ day vintages (keep 90d).
      - name: Archive Old Snapshots
        run: node scripts/archive-old-snapshots.js --keep-days 14 --methods-keep-days 7 --picks-keep-days 90
        continue-on-error: true

      # Tag 119: alert-state.json size guard (GitHub 100MB limit)
      - name: Truncate alert-state if too large
        run: |
          if [ -f alert-state.json ]; then
            size=$(stat -c %s alert-state.json)
            # Tag 150: Always strip methodHistory key (not just when >50MB).
            # Setting to {} was a no-op — the key survived the commit and re-grew
            # every run. delete removes it permanently so saveState() never re-embeds it.
            node -e "const fs=require('fs');let s;try{s=JSON.parse(fs.readFileSync('alert-state.json','utf8'));}catch(e){console.log('alert-state.json corrupt, resetting:',e.message);s={};}delete s.methodHistory;fs.writeFileSync('alert-state.json',JSON.stringify(s));console.log('alert-state.json stripped:',fs.statSync('alert-state.json').size,'bytes (was '+$size+')');"
          fi

      - name: Commit Snapshots + Alert-State
        run: |
          git config user.name "yahoo-pull-bot"
          git config user.email "yahoo-pull-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: yahoo-pull + alert-state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Tag 103d fix: --autostash damit unstaged changes den rebase nicht killen
            for i in 1 2 3; do
              git pull --rebase --autostash --strategy-option theirs origin main || git rebase --abort || true
              if git push; then
                echo "✓ Pushed on attempt $i"
                exit 0
              fi
              echo "Push attempt $i failed, retrying..."
              sleep $((5 * i))
            done
            echo "Push failed after 3 attempts"
            exit 1
          fi

      # Tag 146: Deploy HTML reports to GitHub Pages (gh-pages branch).
      # Separates generated web artifacts from the data/code on main.
      # Deploys: index.html, modes-report.html, diff-report.html, outputs/*.html|csv|md
      # Enable in repo Settings → Pages → Source: Deploy from branch → gh-pages / root.
      # Tag 153: only deploy when data commit succeeded — otherwise gh-pages would show
      # picks from today's run that never landed in main (mismatched report vs data).
      - name: Deploy to GitHub Pages
        if: success()
        run: |
          # Build a clean deploy directory
          mkdir -p _site/outputs
          cp index.html _site/ 2>/dev/null || true
          cp modes-report.html _site/ 2>/dev/null || true
          cp diff-report.html _site/ 2>/dev/null || true
          cp dashboard.html _site/ 2>/dev/null || true
          cp -r outputs/. _site/outputs/ 2>/dev/null || true

          # Push to gh-pages branch (orphan-safe force push)
          cd _site
          git init -b gh-pages
          git config user.name "yahoo-pull-bot"
          git config user.email "yahoo-pull-bot@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          git commit -m "deploy: screener reports $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force origin gh-pages
          echo "✓ GitHub Pages deployed"

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set, skipping notification."
            exit 0
          fi
          curl -H "Content-Type: application/json" -X POST \
            -d "{\"content\": \"⚠ Yahoo-Pull failed at $(date -u). See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK"
