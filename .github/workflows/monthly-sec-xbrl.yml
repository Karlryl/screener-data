name: Monthly SEC XBRL Pull

# Tag 133k: SEC company-facts pull. Runs monthly because 10-Q/K filings are quarterly.
# Cache is git-ignored (lives on runner); only _manifest.json is committed.

on:
  schedule:
    # F-CI-003: moved from 04:00 to 08:00 UTC to avoid overlapping the daily pull
    # (daily pull starts at 02:00 UTC with 180-min timeout — could still be running at 04:00).
    - cron: '0 8 1 * *'  # 08:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      max:
        description: 'Max tickers to pull (test runs)'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || 'main-push' }}
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # Tag 232c-24 (audit F-CI-006 MEDIUM): drift correction from daily-pull.
      # monthly-sec-xbrl was missing three hardenings present in daily-pull:
      # (1) fetch-depth: 0 so git log + reliable rebase work (cherry-pick-back
      # logic in the Commit manifest step needed full history), (2) cache:'npm'
      # which saves ~30-90s per run on the package install, (3) per-step
      # timeouts that prevent the SEC pull from eating the whole 90-min budget.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # F-CI-006 / F-CI-004: full history for reliable rebase

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'  # F-CI-006 / F-CI-011: cache npm deps

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        timeout-minutes: 5

      - name: Pull SEC XBRL
        timeout-minutes: 70  # F-CI-006: bounded so it can't eat the whole 90-min job budget
        env:
          MAX_INPUT: ${{ inputs.max }}
        run: |
          # F-CI-001: validate user-supplied max input before passing to shell to prevent injection
          max="${MAX_INPUT:-0}"; if ! [[ "$max" =~ ^[0-9]+$ ]]; then echo "Invalid max input"; exit 1; fi
          if [ "$max" != "" ] && [ "$max" != "0" ]; then
            node pull-sec-xbrl.js --max "$max"
          else
            node pull-sec-xbrl.js
          fi

      # F-CI-010: Verify SEC XBRL coverage before committing manifest
      - name: Verify SEC Coverage
        run: |
          if [ -f external-data/sec-xbrl/_manifest.json ]; then
            ok=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./external-data/sec-xbrl/_manifest.json','utf8'));console.log(m.n_ok||0)}catch(e){console.log(0)}")
            total=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./external-data/sec-xbrl/_manifest.json','utf8'));console.log(m.n_total||0)}catch(e){console.log(0)}")
            echo "SEC XBRL coverage: $ok / $total"
            if [ "$total" -gt 0 ] && [ "$ok" -lt 100 ]; then
              echo "::warning::SEC XBRL coverage $ok/$total — low coverage, check pull-sec-xbrl.js output"
            fi
          else
            echo "::warning::No SEC XBRL manifest found — pull may have failed"
          fi
          # F-CI-006: hard-fail on critically low coverage or missing manifest
          if [ "${total:-0}" -gt 1000 ] && [ "${ok:-0}" -lt 500 ]; then
            echo "CRITICAL: SEC coverage below 50% with >1000 total tickers"
            exit 1
          fi
          if [ ! -f "external-data/sec-xbrl-manifest.json" ]; then
            echo "CRITICAL: SEC manifest file missing"
            exit 1
          fi

      - name: Commit manifest
        run: |
          git config user.name "sec-xbrl-bot"
          git config user.email "sec-xbrl-bot@users.noreply.github.com"
          git add external-data/sec-xbrl/_manifest.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: sec-xbrl manifest $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Tag 218 (audit F-218c-02 HIGH fix): port the daily-pull
            # F-CI-001 v2 (Tag 179) cherry-pick-back pattern. Previous
            # fallback `git rebase --abort; git reset --hard origin/main`
            # SILENTLY DISCARDED the just-made commit (the SEC-XBRL
            # manifest update), after which `git push` succeeded as a
            # no-op and the workflow reported green while the monthly
            # XBRL data update vanished. New: capture commit SHA before
            # rebase, cherry-pick it back if the rebase loses it.
            COMMIT_SHA=$(git rev-parse HEAD)
            COMMIT_TREE=$(git rev-parse HEAD^{tree})
            for i in 1 2 3; do
              git fetch origin main
              # Tag 232c-7 (audit F-CI-002 HIGH): same fix as daily-pull.yml —
              # plain rebase (drop --strategy-option theirs which silently
              # accepts upstream's bytes on conflict) plus a tree-hash check
              # that catches "commit object survived, content mutated" cases.
              if ! git rebase --autostash origin/main; then
                echo "::warning::Rebase failed on attempt $i — aborting cleanly (preserves local commit)"
                git rebase --abort || true
                NEW_TREE=$(git log -1 --format=%T "$COMMIT_SHA" 2>/dev/null || echo "MISSING")
                # F-CI-002/F-CI-003: use merge-base --is-ancestor instead of O(history) rev-list | grep
                if ! git merge-base --is-ancestor "$COMMIT_SHA" HEAD || [ "$NEW_TREE" != "$COMMIT_TREE" ]; then
                  echo "::warning::Local commit lost or mutated during rebase — restoring from $COMMIT_SHA (tree $COMMIT_TREE)"
                  git reset --hard origin/main
                  git cherry-pick "$COMMIT_SHA" || { echo "::error::cherry-pick failed"; exit 1; }
                fi
              else
                # F-CI-002: update SHA after successful rebase so subsequent iterations use the rewritten commit
                COMMIT_SHA=$(git rev-parse HEAD)
              fi
              if git push; then
                echo "Pushed on attempt $i (commit $(git rev-parse HEAD))"
                exit 0
              fi
              sleep $((5 * i))
            done
            echo "::error::Push failed after 3 attempts"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST \
            -d "{\"content\": \"⚠ SEC-XBRL pull failed at $(date -u). See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK"
