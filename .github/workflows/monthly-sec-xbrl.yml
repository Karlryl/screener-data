name: Monthly SEC XBRL Pull

# Tag 133k: SEC company-facts pull. Runs monthly because 10-Q/K filings are quarterly.
# Cache is git-ignored (lives on runner); only _manifest.json is committed.

on:
  schedule:
    # F-CI-003: moved from 04:00 to 08:00 UTC to avoid overlapping the daily pull
    # (daily pull starts at 02:00 UTC with 180-min timeout — could still be running at 04:00).
    - cron: '0 8 1 * *'  # 08:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      max:
        description: 'Max tickers to pull (test runs)'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: main-push
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Pull SEC XBRL
        run: |
          if [ "${{ inputs.max }}" != "" ] && [ "${{ inputs.max }}" != "0" ]; then
            node pull-sec-xbrl.js --max ${{ inputs.max }}
          else
            node pull-sec-xbrl.js
          fi

      # F-CI-010: Verify SEC XBRL coverage before committing manifest
      - name: Verify SEC Coverage
        run: |
          if [ -f external-data/sec-xbrl/_manifest.json ]; then
            ok=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./external-data/sec-xbrl/_manifest.json','utf8'));console.log(m.n_ok||0)}catch(e){console.log(0)}")
            total=$(node -e "const fs=require('fs');try{const m=JSON.parse(fs.readFileSync('./external-data/sec-xbrl/_manifest.json','utf8'));console.log(m.n_total||0)}catch(e){console.log(0)}")
            echo "SEC XBRL coverage: $ok / $total"
            if [ "$total" -gt 0 ] && [ "$ok" -lt 100 ]; then
              echo "::warning::SEC XBRL coverage $ok/$total — low coverage, check pull-sec-xbrl.js output"
            fi
          else
            echo "::warning::No SEC XBRL manifest found — pull may have failed"
          fi

      - name: Commit manifest
        run: |
          git config user.name "sec-xbrl-bot"
          git config user.email "sec-xbrl-bot@users.noreply.github.com"
          git add external-data/sec-xbrl/_manifest.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: sec-xbrl manifest $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # F-CI-001 (same pattern as daily-pull): fetch before rebase, remove '|| true'
            for i in 1 2 3; do
              git fetch origin main
              git rebase --autostash --strategy-option theirs origin/main || { git rebase --abort; git reset --hard origin/main; }
              if git push; then
                echo "Pushed on attempt $i"
                exit 0
              fi
              sleep $((5 * i))
            done
            # F-CI-009: add missing echo before exit 1
            echo "Push failed after 3 attempts"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          curl -H "Content-Type: application/json" -X POST \
            -d "{\"content\": \"⚠ SEC-XBRL pull failed at $(date -u). See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK"
